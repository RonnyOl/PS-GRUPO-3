spring.application.name=steam-demo

# ===================================================================
# CONFIGURACIÓN DEL SERVIDOR
# ===================================================================
server.port=8080

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (DataSource)
# ===================================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/steam_demo
spring.datasource.username=root
spring.datasource.password=Ro20122003

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# update: actualiza el esquema basado en tus entidades sin borrar datos (ideal para desarrollo)
spring.jpa.hibernate.ddl-auto=update

# Obliga a Hibernate a optimizar las consultas para la sintaxis de MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# OPCIONAL PERO RECOMENDADO EN DESARROLLO: Muestra las consultas SQL limpias en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

